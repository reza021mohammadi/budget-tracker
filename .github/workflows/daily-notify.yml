name: Daily payment notifications

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 CET / 09:00 CEST
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a test push to all registered devices regardless of due date'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: scripts
      - name: Send notifications
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: node send-notifications.js
