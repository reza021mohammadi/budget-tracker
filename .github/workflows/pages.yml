name: Deploy Pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-content

      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          path: develop-content

      - name: Assemble site
        run: |
          mkdir -p site
          rsync -a --exclude='.github' --exclude='.git' --exclude='scripts' main-content/ site/
          mkdir -p site/preview
          rsync -a --exclude='.github' --exclude='.git' --exclude='scripts' develop-content/ site/preview/
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
